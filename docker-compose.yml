services:
  download-model:
    image: python:3.12-slim
    environment:
      - MODEL_ID=${MODEL_ID:-tencent/HunyuanOCR}
      - MODEL_DIR=${MODEL_DIR:-HunyuanOCR}
    volumes:
      - ./models:/models
      - ./download_model.sh:/download_model.sh:ro
    entrypoint: ["sh", "/download_model.sh"]

  ocr:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.24.0}
    container_name: ocr_hunyuan
    depends_on:
      download-model:
        condition: service_completed_successfully
    ipc: host
    entrypoint: ["vllm", "serve"]
    command:
      - /models/${MODEL_DIR:-HunyuanOCR}
      - --served-model-name
      - hunyuan-ocr
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --no-enable-prefix-caching
      - --mm-processor-cache-gb
      - "0"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-16384}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
    ports:
      - "${PORT:-6969}:8000"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 300s
    restart: unless-stopped
