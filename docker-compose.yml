services:
  ocr:
    # Official vLLM OpenAI-compatible server image.
    # HunyuanOCR needs vLLM >= 0.12.0; v0.24.0 is the latest stable (built for CUDA 12.9).
    image: vllm/vllm-openai:${VLLM_TAG:-v0.24.0}
    container_name: ocr_hunyuan
    # vLLM workers need host IPC (shared memory), otherwise they can crash on startup.
    ipc: host
    # entrypoint.sh downloads the model into /models/$MODEL_DIR (skipping the
    # network if it's already there) before exec-ing vllm serve.
    entrypoint: ["sh", "/entrypoint.sh"]
    environment:
      - MODEL_ID=${MODEL_ID:-tencent/HunyuanOCR}
      - MODEL_DIR=${MODEL_DIR:-HunyuanOCR}
      # --- VRAM tuning (target card is 16 GB, below the official 20 GB minimum). See .env ---
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.90}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-16384}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS:-4}
    ports:
      - "${PORT:-6969}:8000"
    volumes:
      - ./models:/models
      - ./entrypoint.sh:/entrypoint.sh:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      # Covers a cold-start download (if the model isn't already in ./models) plus GPU load.
      start_period: 600s
    restart: unless-stopped
